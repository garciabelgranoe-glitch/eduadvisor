name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && corepack prepare pnpm@9.0.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @eduadvisor/api prisma:generate
      - run: pnpm lint
      - run: pnpm --filter @eduadvisor/api test

  e2e-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && corepack prepare pnpm@9.0.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @eduadvisor/web exec playwright install chromium
      - name: Run web E2E (non-blocking temporary)
        run: |
          set +e
          pnpm --filter @eduadvisor/web test
          e2e_exit=$?
          if [ "${e2e_exit}" -ne 0 ]; then
            echo "::warning::Web E2E falló (no bloqueante temporal)."
          fi
          exit 0

  security-semgrep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
      - name: Run Semgrep (OWASP Top 10, error severity)
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --severity ERROR \
            --error \
            --exclude node_modules \
            --exclude .next \
            --exclude dist \
            --exclude docs \
            --exclude apps/web/tests \
            --exclude infra \
            --exclude .github \
            apps/api/src apps/web/app apps/web/lib

  security-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks scan
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            git /repo \
            --redact \
            --verbose \
            --config /repo/.gitleaks.toml

  security-dependencies:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && corepack prepare pnpm@9.0.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit (critical, report-only temporal)
        run: |
          set +e
          pnpm audit --audit-level=critical | tee audit.log
          audit_exit="${PIPESTATUS[0]}"
          if [ "${audit_exit}" -ne 0 ]; then
            echo "::warning::pnpm audit encontró dependencias críticas (modo report-only temporal)."
          fi
          exit 0

  build:
    runs-on: ubuntu-latest
    needs: [quality, security-semgrep, security-secrets, security-dependencies]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && corepack prepare pnpm@9.0.0 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @eduadvisor/api prisma:generate
      - run: pnpm build

  launch-evidence:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: corepack enable && corepack prepare pnpm@9.0.0 --activate
      - run: pnpm install --frozen-lockfile
      - name: Generate launch evidence pack
        run: |
          set +e
          pnpm security:evidence
          evidence_exit=$?
          if [ "${evidence_exit}" -ne 0 ]; then
            echo "::warning::No se pudo generar launch evidence completo (no bloqueante temporal)."
          fi
          exit 0
      - name: Upload launch evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-security-evidence
          path: |
            docs/security/evidence/latest.md
            docs/security/evidence/launch-evidence-*.md
            docs/security/evidence/logs
          if-no-files-found: warn
          retention-days: 14
