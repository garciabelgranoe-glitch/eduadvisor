name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${VERCEL_DEPLOY_HOOK_URL}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL no configurado. Se omite deploy web."
            exit 0
          fi

          curl -fsS -X POST "${VERCEL_DEPLOY_HOOK_URL}"
          echo "Deploy web disparado."

  deploy-api:
    runs-on: ubuntu-latest
    needs: deploy-web
    steps:
      - name: Trigger Railway Deploy Hook
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RAILWAY_DEPLOY_HOOK_URL}" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL no configurado. Se omite deploy API."
            exit 0
          fi

          curl -fsS -X POST "${RAILWAY_DEPLOY_HOOK_URL}"
          echo "Deploy API disparado."

  post-deploy-smoke:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v4

      - name: Run post-deploy smoke checks
        id: smoke
        env:
          SMOKE_WEB_BASE_URL: ${{ secrets.PRODUCTION_WEB_URL }}
          SMOKE_API_BASE_URL: ${{ secrets.PRODUCTION_API_URL }}
          SMOKE_ADMIN_READ_API_KEY: ${{ secrets.PRODUCTION_ADMIN_READ_API_KEY }}
          SMOKE_RETRY_ATTEMPTS: "24"
          SMOKE_RETRY_SLEEP_SECONDS: "10"
        run: |
          mkdir -p artifacts/smoke
          set +e

          if [ -z "${SMOKE_WEB_BASE_URL}" ] || [ -z "${SMOKE_API_BASE_URL}" ]; then
            echo "PRODUCTION_WEB_URL o PRODUCTION_API_URL no configurados. Se omite smoke post-deploy."
            echo "skipped=1" >> "$GITHUB_OUTPUT"
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
            cat > artifacts/smoke/summary.md <<'EOF'
# Post-deploy smoke report

Status: SKIPPED

Reason: `PRODUCTION_WEB_URL` o `PRODUCTION_API_URL` no configuradas.
EOF
            exit 0
          fi

          bash infra/scripts/smoke-post-deploy.sh | tee artifacts/smoke/smoke.log
          smoke_exit="${PIPESTATUS[0]}"

          echo "skipped=0" >> "$GITHUB_OUTPUT"
          echo "exit_code=${smoke_exit}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> "$GITHUB_OUTPUT"
          echo "web_url=${SMOKE_WEB_BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "api_url=${SMOKE_API_BASE_URL}" >> "$GITHUB_OUTPUT"

          if [ "${smoke_exit}" -eq 0 ]; then
            smoke_status="PASS"
          else
            smoke_status="FAIL"
          fi

          cat > artifacts/smoke/summary.md <<EOF
# Post-deploy smoke report

- Status: ${smoke_status}
- Timestamp (UTC): $(date -u +"%Y-%m-%dT%H:%M:%SZ")
- Web URL: ${SMOKE_WEB_BASE_URL}
- API URL: ${SMOKE_API_BASE_URL}
- Script: \`infra/scripts/smoke-post-deploy.sh\`
- Exit code: ${smoke_exit}

## Log file

- \`artifacts/smoke/smoke.log\`
EOF

          exit 0

      - name: Upload smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-smoke
          path: artifacts/smoke
          retention-days: 14

      - name: Fail workflow when smoke fails
        if: steps.smoke.outputs.skipped != '1' && steps.smoke.outputs.exit_code != '0'
        run: |
          echo "Smoke post-deploy falló. Revisar artefacto post-deploy-smoke."
          exit 1
