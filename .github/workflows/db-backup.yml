name: DB Backup

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          BACKUP_DIR: ./artifacts/backups
          RETENTION_DAYS: 14
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "PRODUCTION_DATABASE_URL no configurado. Se omite backup."
            mkdir -p ./artifacts/backups
            echo "skipped" > ./artifacts/backups/README.txt
            exit 0
          fi

          bash infra/scripts/backup-postgres.sh

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: postgres-backup-${{ github.run_id }}
          path: artifacts/backups
          retention-days: 14
